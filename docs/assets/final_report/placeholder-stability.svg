<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-label="placeholder stability experiment chart">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.title{font:700 34px Arial,"Noto Sans SC",sans-serif;fill:#101828}.sub{font:400 17px Arial,"Noto Sans SC",sans-serif;fill:#667085}.warn{font:700 15px Arial,"Noto Sans SC",sans-serif;fill:#b45309}
      .panel{fill:#fff;stroke:#d8dee9;stroke-width:1.3;rx:18}.grid{stroke:#e5e7eb;stroke-width:1}.axis{stroke:#98a2b3;stroke-width:1.6}.label{font:400 13px Arial,"Noto Sans SC",sans-serif;fill:#667085}.h{font:700 18px Arial,"Noto Sans SC",sans-serif;fill:#111827}.val{font:700 14px Arial,"Noto Sans SC",sans-serif;fill:#1f2937}.tiny{font:400 12px Arial,"Noto Sans SC",sans-serif;fill:#667085}
    </style>
  </defs>
  <rect class="bg" width="1600" height="860"/>
  <text class="title" x="70" y="66">多局稳定性实验展示模板</text>
  <text class="sub" x="70" y="96">占位数据，后续需由 run_winrate_experiment.py 或 multi_tier_experiment.py 真实输出替换。</text>
  <text class="warn" x="70" y="126">占位，不作为结论：数值按现有 20 局记录量级编排，仅用于展示图表结构。</text>

  <rect class="panel" x="70" y="170" width="705" height="570"/>
  <text class="h" x="104" y="210">方案完成率与平均决策数（占位）</text>
  <line class="axis" x1="140" y1="660" x2="710" y2="660"/><line class="axis" x1="140" y1="260" x2="140" y2="660"/>
  <g>
    <line class="grid" x1="140" y1="580" x2="710" y2="580"/><text class="label" x="98" y="584">80%</text>
    <line class="grid" x1="140" y1="500" x2="710" y2="500"/><text class="label" x="98" y="504">85%</text>
    <line class="grid" x1="140" y1="420" x2="710" y2="420"/><text class="label" x="98" y="424">90%</text>
    <line class="grid" x1="140" y1="340" x2="710" y2="340"/><text class="label" x="98" y="344">95%</text>
    <line class="grid" x1="140" y1="260" x2="710" y2="260"/><text class="label" x="92" y="264">100%</text>
  </g>
  <rect x="210" y="340" width="76" height="320" fill="#60a5fa" rx="6"/><text class="val" x="222" y="326">95%</text>
  <rect x="400" y="324" width="76" height="336" fill="#34d399" rx="6"/><text class="val" x="412" y="310">96%</text>
  <rect x="590" y="340" width="76" height="320" fill="#f59e0b" rx="6"/><text class="val" x="602" y="326">95%</text>
  <text class="label" x="205" y="694">baseline</text><text class="label" x="388" y="694">trackc_only</text><text class="label" x="608" y="694">both</text>
  <text class="label" x="202" y="718">avg decisions 30</text><text class="label" x="384" y="718">avg decisions 31</text><text class="label" x="583" y="718">avg decisions 32</text>

  <rect class="panel" x="825" y="170" width="705" height="570"/>
  <text class="h" x="859" y="210">知识产出与胜方分布（占位）</text>
  <line class="axis" x1="910" y1="660" x2="1450" y2="660"/><line class="axis" x1="910" y1="260" x2="910" y2="660"/>
  <line class="grid" x1="910" y1="580" x2="1450" y2="580"/><text class="label" x="868" y="584">20</text>
  <line class="grid" x1="910" y1="500" x2="1450" y2="500"/><text class="label" x="868" y="504">40</text>
  <line class="grid" x1="910" y1="420" x2="1450" y2="420"/><text class="label" x="868" y="424">60</text>
  <line class="grid" x1="910" y1="340" x2="1450" y2="340"/><text class="label" x="868" y="344">80</text>
  <line class="grid" x1="910" y1="260" x2="1450" y2="260"/><text class="label" x="860" y="264">100</text>
  <rect x="970" y="660" width="76" height="0" fill="#60a5fa" rx="6"/><text class="val" x="996" y="644">0</text>
  <rect x="1160" y="340" width="76" height="320" fill="#34d399" rx="6"/><text class="val" x="1172" y="326">80</text>
  <rect x="1350" y="320" width="76" height="340" fill="#f59e0b" rx="6"/><text class="val" x="1362" y="306">85</text>
  <text class="label" x="962" y="694">baseline</text><text class="label" x="1148" y="694">trackc_only</text><text class="label" x="1368" y="694">both</text>
  <text class="label" x="955" y="718">V9 / W11</text><text class="label" x="1149" y="718">V10 / W10</text><text class="label" x="1358" y="718">V11 / W9</text>

  <text class="tiny" x="70" y="810">替换要求：真实数据必须给出 experiment_id、provider/model、seed 范围、失败局、fallback、invalid、DB 查询 SQL 或输出文件路径。</text>
</svg>
