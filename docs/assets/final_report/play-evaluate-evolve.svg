<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Play Evaluate Evolve loop">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.title{font:700 34px Arial,"Noto Sans SC",sans-serif;fill:#101828}.sub{font:400 17px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .card{fill:#fff;stroke:#d8dee9;stroke-width:1.4;rx:22}.play{fill:#eef6ff;stroke:#7eb0ee}.eval{fill:#fff1f3;stroke:#df7f8b}.evo{fill:#effaf3;stroke:#7fc392}
      .h{font:700 26px Arial,"Noto Sans SC",sans-serif;fill:#111827}.m{font:600 17px Arial,"Noto Sans SC",sans-serif;fill:#1f2937}.s{font:400 15px Arial,"Noto Sans SC",sans-serif;fill:#526071}.tiny{font:400 13px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .arrow{stroke:#475467;stroke-width:3;fill:none;marker-end:url(#arrow)}.feed{stroke:#b45309;stroke-width:3;stroke-dasharray:9 7;fill:none;marker-end:url(#amber)}
      .badge{font:700 18px Arial,"Noto Sans SC",sans-serif;fill:#fff}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#475467"/></marker>
    <marker id="amber" markerWidth="12" markerHeight="10" refX="11" refY="5" orient="auto"><path d="M0,0 L12,5 L0,10 Z" fill="#b45309"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="70" y="70">Play - Evaluate - Evolve 闭环</text>
  <text class="sub" x="70" y="100">一局游戏产生可审计决策，赛后复盘产生复盘，复盘经验进入知识库并回流到下一局。</text>

  <rect class="card play" x="94" y="190" width="380" height="410"/>
  <circle cx="132" cy="228" r="22" fill="#2563eb"/><text class="badge" x="126" y="235">1</text>
  <text class="h" x="170" y="238">Play：完整对局</text>
  <text class="m" x="132" y="295">输入</text>
  <text class="s" x="132" y="324">角色配置、规则配置、策略知识、LLM provider</text>
  <text class="m" x="132" y="372">执行</text>
  <text class="s" x="132" y="401">WerewolfGame 推进阶段</text>
  <text class="s" x="132" y="430">Visibility 生成 PlayerView</text>
  <text class="s" x="132" y="459">CognitiveAgent 提交 Decision</text>
  <text class="m" x="132" y="507">产物</text>
  <text class="s" x="132" y="536">GameEvent、AgentDecision、GameSnapshot</text>

  <rect class="card eval" x="610" y="190" width="380" height="410"/>
  <circle cx="648" cy="228" r="22" fill="#be123c"/><text class="badge" x="642" y="235">2</text>
  <text class="h" x="686" y="238">Evaluate：赛后复盘</text>
  <text class="m" x="648" y="295">输入</text>
  <text class="s" x="648" y="324">agent_decisions、game_events、终局状态</text>
  <text class="m" x="648" y="372">执行</text>
  <text class="s" x="648" y="401">PerStepScorer 逐步复盘</text>
  <text class="s" x="648" y="430">标记 highlight / mistake</text>
  <text class="s" x="648" y="459">生成 PublishedReview</text>
  <text class="m" x="648" y="507">产物</text>
  <text class="s" x="648" y="536">DecisionScore、ScoredStep、PlayerReviewReport</text>

  <rect class="card evo" x="1126" y="190" width="380" height="410"/>
  <circle cx="1164" cy="228" r="22" fill="#059669"/><text class="badge" x="1158" y="235">3</text>
  <text class="h" x="1202" y="238">Evolve：知识回流</text>
  <text class="m" x="1164" y="295">输入</text>
  <text class="s" x="1164" y="324">ScoredStep、Agent reflection、PublishedReview</text>
  <text class="m" x="1164" y="372">执行</text>
  <text class="s" x="1164" y="401">KnowledgeAbstractor 抽取 lesson</text>
  <text class="s" x="1164" y="430">candidate / active 生命周期</text>
  <text class="s" x="1164" y="459">usage feedback 与 promote</text>
  <text class="m" x="1164" y="507">产物</text>
  <text class="s" x="1164" y="536">StrategyKnowledgeDoc、可检索策略池</text>

  <path class="arrow" d="M474 395 H610"/>
  <path class="arrow" d="M990 395 H1126"/>
  <path class="feed" d="M1316 600 V714 C1316 754 284 754 284 600"/>
  <text class="m" x="628" y="742">StrategyRetriever 将 active 知识注入下一局 Agent Strategy 层</text>

  <rect x="305" y="670" width="990" height="52" fill="#fff" stroke="#d8dee9" rx="18"/>
  <text class="s" x="335" y="703">核心价值：对局不是一次性输出，而是形成“行为证据 → 过程评价 → 策略知识 → 下一局决策”的可审计闭环。</text>
  <text class="tiny" x="70" y="850">图表说明：闭环是系统设计主线；占位或实验数值不在本图中表达。</text>
</svg>
