<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="760" viewBox="0 0 1600 760" role="img" aria-label="design evolution roadmap">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.title{font:700 34px Arial,"Noto Sans SC",sans-serif;fill:#101828}.sub{font:400 17px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .axis{stroke:#98a2b3;stroke-width:3;fill:none}.card{fill:#fff;stroke:#d8dee9;stroke-width:1.3;rx:16}.h{font:700 16px Arial,"Noto Sans SC",sans-serif;fill:#111827}.s{font:400 12.8px Arial,"Noto Sans SC",sans-serif;fill:#596579}.tiny{font:400 12px Arial,"Noto Sans SC",sans-serif;fill:#667085}.badge{font:700 15px Arial,"Noto Sans SC",sans-serif;fill:#fff}
    </style>
  </defs>
  <rect class="bg" width="1600" height="760"/>
  <text class="title" x="70" y="66">设计演进路线图</text>
  <text class="sub" x="70" y="96">项目从“能跑一局”逐步收敛为“能对局、能复盘、能沉淀知识”的闭环系统。</text>
  <path class="axis" d="M135 360 H1465"/>

  <g transform="translate(105 210)">
    <circle cx="70" cy="150" r="24" fill="#2563eb"/><text class="badge" x="65" y="155">1</text>
    <rect class="card" x="0" y="0" width="160" height="118"/>
    <text class="h" x="20" y="34">基础对局</text>
    <text class="s" x="20" y="64">阶段流转</text><text class="s" x="20" y="86">发言 / 投票</text><text class="s" x="20" y="108">终局判定</text>
  </g>
  <g transform="translate(305 410)">
    <circle cx="70" cy="-50" r="24" fill="#0f766e"/><text class="badge" x="65" y="-45">2</text>
    <rect class="card" x="0" y="0" width="170" height="118"/>
    <text class="h" x="20" y="34">信息隔离</text>
    <text class="s" x="20" y="64">PlayerView</text><text class="s" x="20" y="86">private_events</text><text class="s" x="20" y="108">agent_decisions</text>
  </g>
  <g transform="translate(525 210)">
    <circle cx="70" cy="150" r="24" fill="#7c3aed"/><text class="badge" x="65" y="155">3</text>
    <rect class="card" x="0" y="0" width="180" height="118"/>
    <text class="h" x="20" y="34">CognitiveAgent</text>
    <text class="s" x="20" y="64">Observe / Think / Act</text><text class="s" x="20" y="86">记忆 / 信念</text><text class="s" x="20" y="108">三层 Prompt</text>
  </g>
  <g transform="translate(760 410)">
    <circle cx="70" cy="-50" r="24" fill="#b45309"/><text class="badge" x="65" y="-45">4</text>
    <rect class="card" x="0" y="0" width="190" height="118"/>
    <text class="h" x="20" y="34">工具与检索</text>
    <text class="s" x="20" y="64">AgentLoop</text><text class="s" x="20" y="86">search_strategies</text><text class="s" x="20" y="108">4-filter</text>
  </g>
  <g transform="translate(1005 210)">
    <circle cx="70" cy="150" r="24" fill="#be123c"/><text class="badge" x="65" y="155">5</text>
    <rect class="card" x="0" y="0" width="180" height="118"/>
    <text class="h" x="20" y="34">Track B</text>
    <text class="s" x="20" y="64">逐步复盘</text><text class="s" x="20" y="86">高光 / 失误</text><text class="s" x="20" y="108">PublishedReview</text>
  </g>
  <g transform="translate(1240 410)">
    <circle cx="70" cy="-50" r="24" fill="#059669"/><text class="badge" x="65" y="-45">6</text>
    <rect class="card" x="0" y="0" width="190" height="118"/>
    <text class="h" x="20" y="34">Track C + strict</text>
    <text class="s" x="20" y="64">KnowledgeAbstractor</text><text class="s" x="20" y="86">candidate / active</text><text class="s" x="20" y="108">端到端验收</text>
  </g>

  <rect x="305" y="620" width="1010" height="56" fill="#fff" stroke="#d8dee9" rx="18"/>
  <text class="s" x="335" y="653">阶段性成果：基础对局 → 信息不对称 → 认知决策 → 动态策略 → 赛后复盘 → 知识回流与 strict mode 收敛。</text>
  <text class="tiny" x="70" y="720">图表说明：若缺少明确日期，则按项目文档和 DEVELOPMENT_ISSUES 中的阶段性问题整理。</text>
</svg>
