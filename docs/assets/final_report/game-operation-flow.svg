<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="960" viewBox="0 0 1600 960" role="img" aria-label="single game operation flow">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.title{font:700 34px Arial,"Noto Sans SC",sans-serif;fill:#101828}.sub{font:400 17px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .lane{fill:#fff;stroke:#d8dee9;stroke-width:1.2}.laneTitle{font:700 18px Arial,"Noto Sans SC",sans-serif;fill:#344054}
      .step{fill:#eef6ff;stroke:#8bbcf0;stroke-width:1.3;rx:14}.step2{fill:#effaf3;stroke:#86c796;stroke-width:1.3;rx:14}.step3{fill:#fff7e8;stroke:#d5aa55;stroke-width:1.3;rx:14}.step4{fill:#fff1f3;stroke:#dd8792;stroke-width:1.3;rx:14}
      .h{font:700 16px Arial,"Noto Sans SC",sans-serif;fill:#111827}.s{font:400 12.5px Arial,"Noto Sans SC",sans-serif;fill:#566174}.tiny{font:400 12px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .arrow{stroke:#667085;stroke-width:2;fill:none;marker-end:url(#arrow)}.loop{stroke:#0f766e;stroke-width:2.2;stroke-dasharray:7 6;fill:none;marker-end:url(#green)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#667085"/></marker>
    <marker id="green" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#0f766e"/></marker>
  </defs>
  <rect class="bg" width="1600" height="960"/>
  <text class="title" x="70" y="64">单局对局端到端流程</text>
  <text class="sub" x="70" y="94">从创建房间到终局复盘，每个 Agent 行动都经过信息隔离、工具决策、引擎结算和证据链记录。</text>

  <rect class="lane" x="70" y="150" width="1460" height="96"/><text class="laneTitle" x="96" y="184">前端 / 用户</text>
  <rect class="lane" x="70" y="246" width="1460" height="116"/><text class="laneTitle" x="96" y="288">FastAPI / WebSocket</text>
  <rect class="lane" x="70" y="362" width="1460" height="142"/><text class="laneTitle" x="96" y="414">WerewolfGame 引擎</text>
  <rect class="lane" x="70" y="504" width="1460" height="130"/><text class="laneTitle" x="96" y="554">Agent 决策</text>
  <rect class="lane" x="70" y="634" width="1460" height="110"/><text class="laneTitle" x="96" y="686">PostgreSQL</text>
  <rect class="lane" x="70" y="744" width="1460" height="130"/><text class="laneTitle" x="96" y="796">赛后处理</text>

  <rect class="step" x="250" y="171" width="160" height="52"/><text class="h" x="280" y="194">创建房间</text><text class="s" x="280" y="213">人数 / 模式 / 视角</text>
  <rect class="step" x="470" y="171" width="160" height="52"/><text class="h" x="500" y="194">开始对局</text><text class="s" x="500" y="213">订阅 snapshot</text>
  <rect class="step" x="1210" y="171" width="180" height="52"/><text class="h" x="1238" y="194">观战与复盘</text><text class="s" x="1238" y="213">事件 / 发言 / 胜负</text>

  <rect class="step" x="250" y="278" width="160" height="52"/><text class="h" x="278" y="301">REST 建房</text><text class="s" x="278" y="320">room / game_id</text>
  <rect class="step" x="470" y="278" width="160" height="52"/><text class="h" x="498" y="301">WebSocket</text><text class="s" x="498" y="320">实时 snapshot</text>
  <rect class="step" x="1210" y="278" width="180" height="52"/><text class="h" x="1238" y="301">推送终局状态</text><text class="s" x="1238" y="320">winner / reports</text>

  <rect class="step2" x="250" y="392" width="160" height="64"/><text class="h" x="279" y="416">初始化</text><text class="s" x="279" y="436">分配角色 / 座位</text>
  <rect class="step2" x="470" y="392" width="160" height="64"/><text class="h" x="494" y="416">阶段推进</text><text class="s" x="494" y="436">Night / Day / Special</text>
  <rect class="step2" x="690" y="392" width="178" height="64"/><text class="h" x="716" y="416">Visibility</text><text class="s" x="716" y="436">生成 PlayerView</text>
  <rect class="step2" x="930" y="392" width="178" height="64"/><text class="h" x="956" y="416">结算 Action</text><text class="s" x="956" y="436">校验 / 技能 / 投票</text>
  <rect class="step2" x="1210" y="392" width="180" height="64"/><text class="h" x="1238" y="416">胜负判定</text><text class="s" x="1238" y="436">未结束则回到阶段推进</text>

  <rect class="step3" x="690" y="536" width="178" height="58"/><text class="h" x="716" y="560">Observation</text><text class="s" x="716" y="579">局部事实输入</text>
  <rect class="step3" x="930" y="536" width="178" height="58"/><text class="h" x="956" y="560">AgentLoop</text><text class="s" x="956" y="579">工具调用 / 策略检索</text>
  <rect class="step3" x="1150" y="536" width="178" height="58"/><text class="h" x="1176" y="560">Decision</text><text class="s" x="1176" y="579">发言 / 投票 / 技能</text>

  <rect class="step" x="470" y="664" width="180" height="52"/><text class="h" x="498" y="687">game_events</text><text class="s" x="498" y="706">公开与私有事件</text>
  <rect class="step" x="690" y="664" width="198" height="52"/><text class="h" x="716" y="687">agent_decisions</text><text class="s" x="716" y="706">观察 / 工具 / 解析动作</text>
  <rect class="step" x="930" y="664" width="198" height="52"/><text class="h" x="956" y="687">game_snapshots</text><text class="s" x="956" y="706">阶段与状态快照</text>

  <rect class="step4" x="470" y="778" width="190" height="58"/><text class="h" x="498" y="802">Track B 决策质量指标</text><text class="s" x="498" y="821">ScoredStep / Review</text>
  <rect class="step4" x="740" y="778" width="210" height="58"/><text class="h" x="768" y="802">Track C 抽取</text><text class="s" x="768" y="821">Lesson / Candidate</text>
  <rect class="step4" x="1030" y="778" width="220" height="58"/><text class="h" x="1058" y="802">Strategy 回流</text><text class="s" x="1058" y="821">active 策略进入下一局</text>

  <path class="arrow" d="M330 223 V278"/><path class="arrow" d="M550 223 V278"/><path class="arrow" d="M330 330 V392"/><path class="arrow" d="M550 330 V392"/>
  <path class="arrow" d="M410 424 H470"/><path class="arrow" d="M630 424 H690"/><path class="arrow" d="M868 424 H930"/><path class="arrow" d="M1108 424 H1210"/>
  <path class="arrow" d="M779 456 V536"/><path class="arrow" d="M868 565 H930"/><path class="arrow" d="M1108 565 H1150"/><path class="arrow" d="M1239 536 C1215 486 1110 486 1060 456"/>
  <path class="arrow" d="M779 594 V664"/><path class="arrow" d="M1019 456 V664"/><path class="arrow" d="M560 716 V778"/><path class="arrow" d="M789 716 V778"/><path class="arrow" d="M660 807 H740"/><path class="arrow" d="M950 807 H1030"/>
  <path class="loop" d="M1300 392 V350 C1300 330 550 346 550 392"/>
  <path class="loop" d="M1140 778 C1140 720 1328 662 1300 594"/>
  <text class="tiny" x="70" y="914">图表说明：本图描述单局执行路径；真实耗时、决策数和产出量需由运行日志或数据库统计补充。</text>
</svg>
