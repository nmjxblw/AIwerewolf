<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-label="AI Werewolf module map">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.title{font:700 34px Arial,"Noto Sans SC",sans-serif;fill:#101828}.sub{font:400 17px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .card{fill:#fff;stroke:#d8dee9;stroke-width:1.3;rx:18}.h{font:700 20px Arial,"Noto Sans SC",sans-serif;fill:#111827}.m{font:600 15px Arial,"Noto Sans SC",sans-serif;fill:#344054}.s{font:400 13.5px Arial,"Noto Sans SC",sans-serif;fill:#5b6575}.tag{font:700 13px Arial,"Noto Sans SC",sans-serif;fill:#fff}
      .arrow{stroke:#94a3b8;stroke-width:2;fill:none;marker-end:url(#arrow)}.feed{stroke:#b45309;stroke-width:2.2;stroke-dasharray:7 6;fill:none;marker-end:url(#amber)}
      .tiny{font:400 12px Arial,"Noto Sans SC",sans-serif;fill:#667085}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#94a3b8"/></marker>
    <marker id="amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#b45309"/></marker>
  </defs>
  <rect class="bg" width="1600" height="920"/>
  <text class="title" x="70" y="66">核心功能模块图</text>
  <text class="sub" x="70" y="96">九个分层模块共同支撑“完整对局、可审计复盘、策略知识回流”的产品能力。</text>

  <g transform="translate(88 150)">
    <rect class="card" width="430" height="175"/><rect x="24" y="24" width="82" height="28" rx="10" fill="#2563eb"/><text class="tag" x="42" y="43">展示层</text>
    <text class="h" x="24" y="82">前端观战与交互</text><text class="m" x="24" y="112">职责</text><text class="s" x="68" y="112">房间、玩家、阶段、发言、投票、胜负展示</text><text class="m" x="24" y="140">输出</text><text class="s" x="68" y="140">用户操作、观战视图、复盘入口</text>
  </g>
  <g transform="translate(585 150)">
    <rect class="card" width="430" height="175"/><rect x="24" y="24" width="82" height="28" rx="10" fill="#0f766e"/><text class="tag" x="42" y="43">服务层</text>
    <text class="h" x="24" y="82">FastAPI / 房间管理</text><text class="m" x="24" y="112">职责</text><text class="s" x="68" y="112">REST、WebSocket、snapshot 广播、报告接口</text><text class="m" x="24" y="140">输出</text><text class="s" x="68" y="140">对局任务、实时快照、API 响应</text>
  </g>
  <g transform="translate(1082 150)">
    <rect class="card" width="430" height="175"/><rect x="24" y="24" width="82" height="28" rx="10" fill="#059669"/><text class="tag" x="42" y="43">规则层</text>
    <text class="h" x="24" y="82">WerewolfGame 对局引擎</text><text class="m" x="24" y="112">职责</text><text class="s" x="68" y="112">阶段推进、行动校验、技能结算、胜负判定</text><text class="m" x="24" y="140">输出</text><text class="s" x="68" y="140">GameEvent、GameState、终局结果</text>
  </g>

  <g transform="translate(88 390)">
    <rect class="card" width="430" height="175"/><rect x="24" y="24" width="82" height="28" rx="10" fill="#7c3aed"/><text class="tag" x="42" y="43">隔离层</text>
    <text class="h" x="24" y="82">Visibility / PlayerView</text><text class="m" x="24" y="112">职责</text><text class="s" x="68" y="112">裁剪真实状态，区分公开、私有、阵营信息</text><text class="m" x="24" y="140">输出</text><text class="s" x="68" y="140">每个 Agent 的合法局部视图</text>
  </g>
  <g transform="translate(585 390)">
    <rect class="card" width="430" height="175"/><rect x="24" y="24" width="82" height="28" rx="10" fill="#b45309"/><text class="tag" x="42" y="43">决策层</text>
    <text class="h" x="24" y="82">CognitiveAgent / AgentLoop</text><text class="m" x="24" y="112">职责</text><text class="s" x="68" y="112">Observe、Think、工具调用、统一 Decision 输出</text><text class="m" x="24" y="140">输出</text><text class="s" x="68" y="140">发言、投票、夜间技能、tool_trace</text>
  </g>
  <g transform="translate(1082 390)">
    <rect class="card" width="430" height="175"/><rect x="24" y="24" width="82" height="28" rx="10" fill="#0ea5e9"/><text class="tag" x="42" y="43">检索层</text>
    <text class="h" x="24" y="82">StrategyRetriever</text><text class="m" x="24" y="112">职责</text><text class="s" x="68" y="112">BM25、RetrievalPolicy、4-filter、策略注入</text><text class="m" x="24" y="140">输出</text><text class="s" x="68" y="140">可解释策略片段与使用反馈</text>
  </g>

  <g transform="translate(88 630)">
    <rect class="card" width="430" height="175"/><rect x="24" y="24" width="82" height="28" rx="10" fill="#334155"/><text class="tag" x="42" y="43">数据层</text>
    <text class="h" x="24" y="82">PostgreSQL Evidence Chain</text><text class="m" x="24" y="112">职责</text><text class="s" x="68" y="112">保存事件、快照、决策、决策质量指标、知识、反馈</text><text class="m" x="24" y="140">输出</text><text class="s" x="68" y="140">可审计、可统计、可回放的数据资产</text>
  </g>
  <g transform="translate(585 630)">
    <rect class="card" width="430" height="175"/><rect x="24" y="24" width="82" height="28" rx="10" fill="#be123c"/><text class="tag" x="42" y="43">复盘层</text>
    <text class="h" x="24" y="82">Track B / PerStepScorer</text><text class="m" x="24" y="112">职责</text><text class="s" x="68" y="112">逐步复盘、高光/失误标记、PublishedReview</text><text class="m" x="24" y="140">输出</text><text class="s" x="68" y="140">ScoredStep、PlayerReviewReport</text>
  </g>
  <g transform="translate(1082 630)">
    <rect class="card" width="430" height="175"/><rect x="24" y="24" width="82" height="28" rx="10" fill="#059669"/><text class="tag" x="42" y="43">进化层</text>
    <text class="h" x="24" y="82">Track C / KnowledgeAbstractor</text><text class="m" x="24" y="112">职责</text><text class="s" x="68" y="112">经验抽取、candidate/active 生命周期、晋级反馈</text><text class="m" x="24" y="140">输出</text><text class="s" x="68" y="140">StrategyKnowledgeDoc、下一局策略输入</text>
  </g>

  <path class="arrow" d="M518 238 H585"/><path class="arrow" d="M1015 238 H1082"/><path class="arrow" d="M1297 325 V390"/>
  <path class="arrow" d="M1082 478 H1015"/><path class="arrow" d="M585 478 H518"/><path class="arrow" d="M303 565 V630"/>
  <path class="arrow" d="M518 718 H585"/><path class="arrow" d="M1015 718 H1082"/><path class="feed" d="M1297 630 V594 C1297 575 1297 575 1297 565"/>
  <text class="tiny" x="70" y="870">图表说明：该图强调模块职责和上下游边界；具体代码实现只作为证据来源，不在图中展开。</text>
</svg>
