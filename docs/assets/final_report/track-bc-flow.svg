<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-label="Track B and Track C flow">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.title{font:700 34px Arial,"Noto Sans SC",sans-serif;fill:#101828}.sub{font:400 17px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .zone{fill:#fff;stroke:#d8dee9;stroke-width:1.4;rx:22}.score{fill:#fff1f3;stroke:#df8792;stroke-width:1.3;rx:14}.know{fill:#effaf3;stroke:#83c796;stroke-width:1.3;rx:14}.data{fill:#eef6ff;stroke:#83b4ee;stroke-width:1.3;rx:14}.guard{fill:#fff7e8;stroke:#d5a957;stroke-width:1.3;rx:14}
      .h{font:700 20px Arial,"Noto Sans SC",sans-serif;fill:#111827}.m{font:600 15px Arial,"Noto Sans SC",sans-serif;fill:#344054}.s{font:400 13.5px Arial,"Noto Sans SC",sans-serif;fill:#5b6575}.tiny{font:400 12px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .arrow{stroke:#667085;stroke-width:2.3;fill:none;marker-end:url(#arrow)}.feed{stroke:#b45309;stroke-width:2.3;stroke-dasharray:8 6;fill:none;marker-end:url(#amber)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#667085"/></marker>
    <marker id="amber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#b45309"/></marker>
  </defs>
  <rect class="bg" width="1600" height="900"/>
  <text class="title" x="70" y="66">Track B 复盘分析与 Track C 知识回流流程</text>
  <text class="sub" x="70" y="96">胜负只能说明结果，Track B/C 负责解释过程、沉淀经验，并控制新知识进入策略池的风险。</text>

  <rect class="zone" x="70" y="160" width="700" height="610"/><text class="h" x="104" y="204">Track B：赛后复盘</text>
  <rect class="data" x="120" y="250" width="210" height="88"/><text class="m" x="148" y="284">agent_decisions</text><text class="s" x="148" y="311">观察、工具、动作</text>
  <rect class="data" x="120" y="390" width="210" height="88"/><text class="m" x="148" y="424">game_events</text><text class="s" x="148" y="451">公开/私有事件</text>
  <rect class="score" x="410" y="250" width="230" height="88"/><text class="m" x="438" y="284">PerStepScorer</text><text class="s" x="438" y="311">发言 / 投票 / 技能逐步复盘</text>
  <rect class="score" x="410" y="390" width="230" height="88"/><text class="m" x="438" y="424">ScoredStep</text><text class="s" x="438" y="451">score、highlight、mistake</text>
  <rect class="score" x="410" y="530" width="230" height="88"/><text class="m" x="438" y="564">PublishedReview</text><text class="s" x="438" y="591">玩家复盘与展示报告</text>

  <rect class="zone" x="830" y="160" width="700" height="610"/><text class="h" x="864" y="204">Track C：知识自进化</text>
  <rect class="know" x="880" y="250" width="230" height="88"/><text class="m" x="908" y="284">KnowledgeAbstractor</text><text class="s" x="908" y="311">从高光和失误抽取 lesson</text>
  <rect class="know" x="880" y="390" width="230" height="88"/><text class="m" x="908" y="424">AbstractedLesson</text><text class="s" x="908" y="451">recommend / avoid / rationale</text>
  <rect class="guard" x="880" y="530" width="230" height="88"/><text class="m" x="908" y="564">candidate pool</text><text class="s" x="908" y="591">默认隔离，不直接污染 active</text>
  <rect class="guard" x="1210" y="390" width="230" height="88"/><text class="m" x="1238" y="424">promote / feedback</text><text class="s" x="1238" y="451">晋级、降级、使用反馈</text>
  <rect class="know" x="1210" y="530" width="230" height="88"/><text class="m" x="1238" y="564">active pool</text><text class="s" x="1238" y="591">下一局可检索策略</text>

  <path class="arrow" d="M330 294 H410"/><path class="arrow" d="M330 434 H410"/><path class="arrow" d="M525 338 V390"/><path class="arrow" d="M525 478 V530"/>
  <path class="arrow" d="M640 434 H830 C850 434 850 294 880 294"/>
  <path class="arrow" d="M995 338 V390"/><path class="arrow" d="M995 478 V530"/>
  <path class="arrow" d="M1110 574 H1210"/><path class="arrow" d="M1325 478 V530"/>
  <path class="feed" d="M1325 530 C1325 700 996 700 996 618"/>
  <rect x="250" y="685" width="1080" height="54" fill="#fff" stroke="#d8dee9" rx="18"/>
  <text class="s" x="280" y="718">结项报告可写：Track B/C 链路已实现并有验收记录。不可写：Track C 已显著提升胜率，除非后续补齐平衡在线实验。</text>
  <text class="tiny" x="70" y="842">图表说明：该图是流程说明，Track B Tier 触发比例和 Track C 晋级率需通过后续实验统计。</text>
</svg>
