<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-label="AI Werewolf system architecture">
  <defs>
    <style>
      .bg{fill:#f6f8fb}
      .panel{fill:#fff;stroke:#d8dee9;stroke-width:1.4;rx:18}
      .band{fill:#eef6ff;stroke:#9dc3f5;stroke-width:1.2;rx:14}
      .run{fill:#effaf3;stroke:#8bc79c;stroke-width:1.2;rx:14}
      .agent{fill:#fff7e8;stroke:#d8aa4f;stroke-width:1.2;rx:14}
      .data{fill:#f4f6f8;stroke:#b8c0ce;stroke-width:1.2;rx:14}
      .eval{fill:#fff0f1;stroke:#e18a94;stroke-width:1.2;rx:14}
      .title{font:700 34px Arial,"Noto Sans SC",sans-serif;fill:#101828}
      .sub{font:400 17px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .h{font:700 20px Arial,"Noto Sans SC",sans-serif;fill:#111827}
      .m{font:600 16px Arial,"Noto Sans SC",sans-serif;fill:#1f2937}
      .s{font:400 13.5px Arial,"Noto Sans SC",sans-serif;fill:#586174}
      .tiny{font:400 12px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .num{font:700 14px Arial,"Noto Sans SC",sans-serif;fill:#fff}
      .numc{fill:#2563eb}
      .arrow{stroke:#667085;stroke-width:2.2;fill:none;marker-end:url(#arrow)}
      .arrow2{stroke:#0f766e;stroke-width:2.4;fill:none;marker-end:url(#arrowGreen)}
      .feed{stroke:#b45309;stroke-width:2.3;stroke-dasharray:8 6;fill:none;marker-end:url(#arrowAmber)}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#667085"/></marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#0f766e"/></marker>
    <marker id="arrowAmber" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#b45309"/></marker>
  </defs>

  <rect class="bg" width="1600" height="920"/>
  <text class="title" x="70" y="66">AI 狼人杀多智能体对战与自进化系统架构</text>
  <text class="sub" x="70" y="96">Play 局内对战 → Evaluate 赛后复盘 → Evolve 知识回流；所有真实数据经 PostgreSQL 证据链追溯。</text>

  <rect class="panel" x="56" y="134" width="1488" height="705"/>
  <text class="h" x="92" y="178">运行主链路</text>
  <text class="tiny" x="92" y="202">Agent 不直接修改 GameState，只提交 Decision，由引擎统一校验与结算。</text>

  <rect class="band" x="92" y="245" width="220" height="118"/>
  <circle class="numc" cx="118" cy="271" r="15"/><text class="num" x="113" y="276">1</text>
  <text class="m" x="145" y="275">Frontend Console</text>
  <text class="s" x="118" y="306">大厅 / 房间 / 观战</text>
  <text class="s" x="118" y="329">公开视角 / 主持视角</text>
  <text class="s" x="118" y="352">事件流与复盘入口</text>

  <rect class="band" x="370" y="245" width="220" height="118"/>
  <circle class="numc" cx="396" cy="271" r="15"/><text class="num" x="391" y="276">2</text>
  <text class="m" x="423" y="275">FastAPI / WebSocket</text>
  <text class="s" x="396" y="306">房间管理</text>
  <text class="s" x="396" y="329">snapshot 广播</text>
  <text class="s" x="396" y="352">报告与实验接口</text>

  <rect class="run" x="648" y="226" width="250" height="156"/>
  <circle class="numc" cx="674" cy="252" r="15"/><text class="num" x="669" y="257">3</text>
  <text class="m" x="701" y="256">WerewolfGame</text>
  <text class="s" x="674" y="289">阶段状态机</text>
  <text class="s" x="674" y="312">行动合法性校验</text>
  <text class="s" x="674" y="335">技能结算 / 投票 / 死亡</text>
  <text class="s" x="674" y="358">胜负判定 / 幂等守卫</text>

  <rect class="run" x="956" y="245" width="230" height="118"/>
  <circle class="numc" cx="982" cy="271" r="15"/><text class="num" x="977" y="276">4</text>
  <text class="m" x="1009" y="275">Visibility / PlayerView</text>
  <text class="s" x="982" y="306">GameState 裁剪</text>
  <text class="s" x="982" y="329">私有事件隔离</text>
  <text class="s" x="982" y="352">合法目标边界</text>

  <rect class="agent" x="1240" y="245" width="230" height="118"/>
  <circle class="numc" cx="1266" cy="271" r="15"/><text class="num" x="1261" y="276">5</text>
  <text class="m" x="1293" y="275">CognitiveAgent</text>
  <text class="s" x="1266" y="306">Observe → Think → Act</text>
  <text class="s" x="1266" y="329">Persona / Role / Strategy</text>
  <text class="s" x="1266" y="352">记忆、信念、社交模型</text>

  <rect class="agent" x="1020" y="460" width="250" height="136"/>
  <circle class="numc" cx="1046" cy="486" r="15"/><text class="num" x="1041" y="491">6</text>
  <text class="m" x="1073" y="490">AgentLoop / Tools</text>
  <text class="s" x="1046" y="523">search_strategies</text>
  <text class="s" x="1046" y="546">recall_memory / check_rules</text>
  <text class="s" x="1046" y="569">analyze_votes / submit_decision</text>

  <rect class="agent" x="704" y="460" width="250" height="136"/>
  <circle class="numc" cx="730" cy="486" r="15"/><text class="num" x="725" y="491">7</text>
  <text class="m" x="757" y="490">StrategyRetriever</text>
  <text class="s" x="730" y="523">BM25 + 倒排索引</text>
  <text class="s" x="730" y="546">RetrievalPolicy</text>
  <text class="s" x="730" y="569">4-filter 安全管线</text>

  <rect class="data" x="370" y="452" width="270" height="152"/>
  <circle class="numc" cx="396" cy="478" r="15"/><text class="num" x="391" y="483">8</text>
  <text class="m" x="423" y="482">PostgreSQL 证据链</text>
  <text class="s" x="396" y="515">games / players / events</text>
  <text class="s" x="396" y="538">snapshots / agent_decisions</text>
  <text class="s" x="396" y="561">reviews / knowledge / feedback</text>
  <text class="s" x="396" y="584">支撑复盘、统计、回放</text>

  <rect class="eval" x="92" y="510" width="220" height="118"/>
  <circle class="numc" cx="118" cy="536" r="15"/><text class="num" x="113" y="541">9</text>
  <text class="m" x="145" y="540">Track B 赛后复盘</text>
  <text class="s" x="118" y="571">PerStepScorer</text>
  <text class="s" x="118" y="594">ScoredStep / 高光 / 失误</text>
  <text class="s" x="118" y="617">PublishedReview</text>

  <rect class="eval" x="370" y="680" width="270" height="118"/>
  <circle class="numc" cx="396" cy="706" r="15"/><text class="num" x="386" y="711">10</text>
  <text class="m" x="423" y="710">Track C 知识回流</text>
  <text class="s" x="396" y="741">KnowledgeAbstractor</text>
  <text class="s" x="396" y="764">lesson → candidate → active</text>
  <text class="s" x="396" y="787">promotion / usage feedback</text>

  <rect class="data" x="704" y="680" width="290" height="118"/>
  <circle class="numc" cx="730" cy="706" r="15"/><text class="num" x="720" y="711">11</text>
  <text class="m" x="757" y="710">Strategy Knowledge Pool</text>
  <text class="s" x="730" y="741">strategy_knowledge_docs</text>
  <text class="s" x="730" y="764">active / candidate / deprecated</text>
  <text class="s" x="730" y="787">下一局策略检索来源</text>

  <path class="arrow" d="M312 304 H370"/>
  <path class="arrow" d="M590 304 H648"/>
  <path class="arrow" d="M898 304 H956"/>
  <path class="arrow" d="M1186 304 H1240"/>
  <path class="arrow" d="M1355 363 V414 C1355 438 1250 438 1250 460"/>
  <path class="arrow" d="M1020 528 H954"/>
  <path class="arrow2" d="M704 528 H640"/>
  <path class="arrow2" d="M505 452 V382 C505 356 648 356 648 340"/>
  <path class="arrow2" d="M640 528 H704"/>
  <path class="arrow" d="M770 382 V422 C770 442 504 432 504 452"/>
  <path class="arrow" d="M370 548 H312"/>
  <path class="arrow" d="M202 628 V658 C202 680 370 680 370 720"/>
  <path class="arrow" d="M640 740 H704"/>
  <path class="feed" d="M849 680 V626 C849 608 820 608 820 596"/>
  <path class="feed" d="M829 460 V420 C829 394 1290 394 1290 363"/>

  <rect x="1096" y="690" width="340" height="92" fill="#fff" stroke="#d8dee9" stroke-width="1.1" rx="14"/>
  <text class="m" x="1120" y="724">关键边界</text>
  <text class="s" x="1120" y="752">1. GameState 是真实状态，PlayerView 是局部视图。</text>
  <text class="s" x="1120" y="775">2. 新知识默认进入 candidate，不直接污染 active。</text>
  <text class="tiny" x="70" y="880">图表说明：本图为报告展示图；模块名称来自当前代码与项目文档，非实验结论。</text>
</svg>
