<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="840" viewBox="0 0 1600 840" role="img" aria-label="decision evidence chain">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.title{font:700 34px Arial,"Noto Sans SC",sans-serif;fill:#101828}.sub{font:400 17px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .card{fill:#fff;stroke:#d8dee9;stroke-width:1.35;rx:18}.blue{fill:#eef6ff;stroke:#86b7ee}.green{fill:#effaf3;stroke:#83c796}.red{fill:#fff1f3;stroke:#de8792}.amber{fill:#fff7e8;stroke:#d2a64d}.gray{fill:#f4f6f8;stroke:#b8c0ce}
      .h{font:700 18px Arial,"Noto Sans SC",sans-serif;fill:#111827}.m{font:600 14px Arial,"Noto Sans SC",sans-serif;fill:#344054}.s{font:400 13px Arial,"Noto Sans SC",sans-serif;fill:#5b6575}.tiny{font:400 12px Arial,"Noto Sans SC",sans-serif;fill:#667085}
      .arrow{stroke:#667085;stroke-width:2.4;fill:none;marker-end:url(#arrow)}.audit{stroke:#b45309;stroke-width:2.2;stroke-dasharray:8 6;fill:none;marker-end:url(#amberArrow)}
      .badge{fill:#2563eb}.btxt{font:700 14px Arial,"Noto Sans SC",sans-serif;fill:#fff}
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#667085"/></marker>
    <marker id="amberArrow" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto"><path d="M0,0 L10,4 L0,8 Z" fill="#b45309"/></marker>
  </defs>
  <rect class="bg" width="1600" height="840"/>
  <text class="title" x="70" y="66">决策证据链</text>
  <text class="sub" x="70" y="96">系统保存“看见了什么、做了什么、如何复盘、抽取了什么经验、是否回流”的完整链路。</text>

  <rect class="card blue" x="80" y="220" width="210" height="168"/>
  <circle class="badge" cx="106" cy="246" r="15"/><text class="btxt" x="101" y="251">1</text>
  <text class="h" x="132" y="251">GameEvent</text>
  <text class="m" x="106" y="292">记录</text>
  <text class="s" x="106" y="318">phase / actor / target</text>
  <text class="s" x="106" y="341">public/private event</text>
  <text class="m" x="106" y="370">价值</text>
  <text class="s" x="106" y="370"></text>
  <text class="s" x="106" y="392">还原局内事实</text>

  <rect class="card blue" x="340" y="220" width="230" height="168"/>
  <circle class="badge" cx="366" cy="246" r="15"/><text class="btxt" x="361" y="251">2</text>
  <text class="h" x="392" y="251">AgentDecision</text>
  <text class="m" x="366" y="292">记录</text>
  <text class="s" x="366" y="318">observation / legal actions</text>
  <text class="s" x="366" y="341">raw output / parsed action</text>
  <text class="m" x="366" y="370">价值</text>
  <text class="s" x="366" y="392">审计可见事实与决策</text>

  <rect class="card red" x="620" y="220" width="230" height="168"/>
  <circle class="badge" cx="646" cy="246" r="15"/><text class="btxt" x="641" y="251">3</text>
  <text class="h" x="672" y="251">DecisionScore</text>
  <text class="m" x="646" y="292">记录</text>
  <text class="s" x="646" y="318">正确性 / 推理质量</text>
  <text class="s" x="646" y="341">时机 / 影响 / 总分</text>
  <text class="m" x="646" y="370">价值</text>
  <text class="s" x="646" y="392">量化单步决策质量</text>

  <rect class="card red" x="900" y="220" width="230" height="168"/>
  <circle class="badge" cx="926" cy="246" r="15"/><text class="btxt" x="921" y="251">4</text>
  <text class="h" x="952" y="251">ScoredStep</text>
  <text class="m" x="926" y="292">记录</text>
  <text class="s" x="926" y="318">step score / high impact</text>
  <text class="s" x="926" y="341">highlight / mistake</text>
  <text class="m" x="926" y="370">价值</text>
  <text class="s" x="926" y="392">定位高光和失误</text>

  <rect class="card green" x="1180" y="220" width="250" height="168"/>
  <circle class="badge" cx="1206" cy="246" r="15"/><text class="btxt" x="1201" y="251">5</text>
  <text class="h" x="1232" y="251">AbstractedLesson</text>
  <text class="m" x="1206" y="292">记录</text>
  <text class="s" x="1206" y="318">recommend / avoid</text>
  <text class="s" x="1206" y="341">rationale / source events</text>
  <text class="m" x="1206" y="370">价值</text>
  <text class="s" x="1206" y="392">把复盘转成经验</text>

  <rect class="card green" x="455" y="540" width="310" height="150"/>
  <circle class="badge" cx="481" cy="566" r="15"/><text class="btxt" x="476" y="571">6</text>
  <text class="h" x="507" y="571">StrategyKnowledgeDoc</text>
  <text class="s" x="481" y="612">role / phase / mbti / alignment</text>
  <text class="s" x="481" y="635">status: candidate / active / deprecated</text>
  <text class="s" x="481" y="658">visibility_scope / applicability / confidence</text>

  <rect class="card amber" x="880" y="540" width="270" height="150"/>
  <text class="h" x="914" y="571">StrategyRetriever</text>
  <text class="s" x="914" y="612">BM25 + RetrievalPolicy</text>
  <text class="s" x="914" y="635">4-filter 安全过滤</text>
  <text class="s" x="914" y="658">进入下一局 Strategy 层</text>

  <path class="arrow" d="M290 304 H340"/><path class="arrow" d="M570 304 H620"/><path class="arrow" d="M850 304 H900"/><path class="arrow" d="M1130 304 H1180"/>
  <path class="arrow" d="M1305 388 C1305 470 610 456 610 540"/>
  <path class="arrow" d="M765 615 H880"/>
  <path class="audit" d="M1015 540 C1015 465 458 470 458 388"/>
  <text class="m" x="835" y="462">可追溯回源</text>

  <rect class="card gray" x="120" y="520" width="260" height="104"/>
  <text class="h" x="148" y="554">审计边界</text>
  <text class="s" x="148" y="584">复盘时只应使用 Agent 当时可见信息。</text>
  <text class="s" x="148" y="607">不可把主持视角事实倒推给 Agent。</text>

  <text class="tiny" x="70" y="790">图表说明：该图用于展示数据链路，不表示每次运行都有相同数量的 lesson 或知识文档。</text>
</svg>
