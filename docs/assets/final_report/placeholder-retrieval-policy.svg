<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="860" viewBox="0 0 1600 860" role="img" aria-label="placeholder retrieval policy chart">
  <defs>
    <style>
      .bg{fill:#f7f9fc}.title{font:700 34px Arial,"Noto Sans SC",sans-serif;fill:#101828}.sub{font:400 17px Arial,"Noto Sans SC",sans-serif;fill:#667085}.warn{font:700 15px Arial,"Noto Sans SC",sans-serif;fill:#b45309}
      .panel{fill:#fff;stroke:#d8dee9;stroke-width:1.3;rx:18}.grid{stroke:#e5e7eb;stroke-width:1}.axis{stroke:#98a2b3;stroke-width:1.6}.label{font:400 13px Arial,"Noto Sans SC",sans-serif;fill:#667085}.h{font:700 18px Arial,"Noto Sans SC",sans-serif;fill:#111827}.val{font:700 13px Arial,"Noto Sans SC",sans-serif;fill:#1f2937}.tiny{font:400 12px Arial,"Noto Sans SC",sans-serif;fill:#667085}
    </style>
  </defs>
  <rect class="bg" width="1600" height="860"/>
  <text class="title" x="70" y="66">检索策略对比展示模板</text>
  <text class="sub" x="70" y="96">占位数据，后续需用真实在线对局或检索评估输出替换。</text>
  <text class="warn" x="70" y="126">占位，不作为结论：当前真实可引用的是 retrieval_policy_results.md，不能把本图数值写成实验结果。</text>

  <rect class="panel" x="70" y="170" width="1460" height="570"/>
  <text class="h" x="104" y="210">平均决策分、策略命中率与策略使用率（占位）</text>
  <line class="axis" x1="160" y1="660" x2="1450" y2="660"/><line class="axis" x1="160" y1="260" x2="160" y2="660"/>
  <line class="grid" x1="160" y1="580" x2="1450" y2="580"/><text class="label" x="118" y="584">20%</text>
  <line class="grid" x1="160" y1="500" x2="1450" y2="500"/><text class="label" x="118" y="504">40%</text>
  <line class="grid" x1="160" y1="420" x2="1450" y2="420"/><text class="label" x="118" y="424">60%</text>
  <line class="grid" x1="160" y1="340" x2="1450" y2="340"/><text class="label" x="118" y="344">80%</text>
  <line class="grid" x1="160" y1="260" x2="1450" y2="260"/><text class="label" x="112" y="264">100%</text>

  <g transform="translate(230 0)">
    <rect x="0" y="412" width="34" height="248" fill="#60a5fa" rx="5"/><rect x="44" y="500" width="34" height="160" fill="#34d399" rx="5"/><rect x="88" y="560" width="34" height="100" fill="#f59e0b" rx="5"/>
    <text class="val" x="-3" y="396">0.62</text><text class="val" x="42" y="484">40%</text><text class="val" x="86" y="544">25%</text><text class="label" x="-25" y="694">global_only</text>
  </g>
  <g transform="translate(485 0)">
    <rect x="0" y="388" width="34" height="272" fill="#60a5fa" rx="5"/><rect x="44" y="360" width="34" height="300" fill="#34d399" rx="5"/><rect x="88" y="480" width="34" height="180" fill="#f59e0b" rx="5"/>
    <text class="val" x="-3" y="372">0.68</text><text class="val" x="42" y="344">75%</text><text class="val" x="86" y="464">45%</text><text class="label" x="-40" y="694">same_role_all_mbti</text>
  </g>
  <g transform="translate(750 0)">
    <rect x="0" y="380" width="34" height="280" fill="#60a5fa" rx="5"/><rect x="44" y="348" width="34" height="312" fill="#34d399" rx="5"/><rect x="88" y="468" width="34" height="192" fill="#f59e0b" rx="5"/>
    <text class="val" x="-3" y="364">0.70</text><text class="val" x="42" y="332">78%</text><text class="val" x="86" y="452">48%</text><text class="label" x="-47" y="694">same_role_same_mbti</text>
  </g>
  <g transform="translate(1025 0)">
    <rect x="0" y="376" width="34" height="284" fill="#60a5fa" rx="5"/><rect x="44" y="340" width="34" height="320" fill="#34d399" rx="5"/><rect x="88" y="460" width="34" height="200" fill="#f59e0b" rx="5"/>
    <text class="val" x="-3" y="360">0.71</text><text class="val" x="42" y="324">80%</text><text class="val" x="86" y="444">50%</text><text class="label" x="-58" y="694">hybrid_role_mbti_global</text>
  </g>
  <g transform="translate(1300 0)">
    <rect x="0" y="384" width="34" height="276" fill="#60a5fa" rx="5"/><rect x="44" y="356" width="34" height="304" fill="#34d399" rx="5"/><rect x="88" y="476" width="34" height="184" fill="#f59e0b" rx="5"/>
    <text class="val" x="-3" y="368">0.69</text><text class="val" x="42" y="340">76%</text><text class="val" x="86" y="460">46%</text><text class="label" x="-70" y="694">hybrid_alignment_phase</text>
  </g>

  <rect x="104" y="232" width="350" height="46" fill="#fff" stroke="#d8dee9" rx="14"/>
  <rect x="126" y="248" width="18" height="18" fill="#60a5fa" rx="4"/><text class="label" x="152" y="262">平均决策分 x100</text>
  <rect x="278" y="248" width="18" height="18" fill="#34d399" rx="4"/><text class="label" x="304" y="262">命中率</text>
  <rect x="368" y="248" width="18" height="18" fill="#f59e0b" rx="4"/><text class="label" x="394" y="262">使用率</text>

  <text class="tiny" x="70" y="810">替换要求：真实数据需区分 offline weak-label、LLM judge 和 online game ablation；不能把离线检索分数解释为胜率提升。</text>
</svg>
